<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhitta Trading Signals — EUR/USD · GBP/USD · XAU/USD · USD/JPY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0f;--bg2:#111318;--bg3:#181c22;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--muted:#6b7280;
  --green:#22c55e;--green-dim:#16a34a22;
  --red:#ef4444;--red-dim:#dc262622;
  --amber:#f59e0b;--blue:#3b82f6;--gold:#fbbf24;--purple:#a78bfa;
  --jackpot:#ff6b35;--jackpot-dim:#ff6b3520;
  --font-head:'Syne',sans-serif;--font-mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:radial-gradient(circle at top right,#fbbf2412 0%,transparent 25%),
             radial-gradient(circle at bottom left,#fbbf2410 0%,transparent 30%),#050505;
  color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden;
}
.shell{max-width:1120px;margin:0 auto;padding:22px 16px 60px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.6s infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clock{font-size:15px;color:var(--gold);font-weight:600;font-family:var(--font-head)}
.tabs{display:flex;gap:12px;margin-bottom:25px}
.tab{flex:none;padding:12px 22px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);font-size:13px;color:var(--muted);transition:.2s}
.tab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.tab-panel{display:none}.tab-panel.active{display:block}
.btn{background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:7px 13px;border-radius:6px;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.btn.primary:hover{background:#fcd34d}
.btn.danger{border-color:rgba(239,68,68,.4);color:var(--red)}
.btn.danger:hover{background:var(--red-dim);border-color:var(--red)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.metric{background:rgba(17,19,24,.85);backdrop-filter:blur(18px);border:1px solid rgba(251,191,36,.12);border-radius:24px;padding:22px}
.metric-label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.metric-value{font-size:19px;font-weight:500;font-family:var(--font-head)}
.metric-sub{font-size:11px;color:var(--muted);margin-top:3px}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.gold{color:var(--gold)}.blue{color:var(--blue)}.purple{color:var(--purple)}
.sess-strip{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:16px}
.sess-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.sess-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;font-weight:500}
.sess-active{background:#22c55e15;border-color:var(--green);color:var(--green)}
.sess-inactive{background:transparent;border-color:var(--border2);color:var(--muted)}
.sess-overlap{background:#fbbf2418;border-color:var(--gold);color:var(--gold)}
.wq{font-size:12px;padding:8px 12px;border-radius:6px}
.wq-prime{background:#22c55e12;border:1px solid #22c55e44;color:var(--green)}
.wq-good{background:#3b82f612;border:1px solid #3b82f644;color:var(--blue)}
.wq-caution{background:#f59e0b12;border:1px solid #f59e0b44;color:var(--amber)}
.wq-avoid{background:#ef444412;border:1px solid #ef444444;color:var(--red)}
.pair-card{background:rgba(17,19,24,.75);backdrop-filter:blur(18px);border:1px solid rgba(251,191,36,.12);border-radius:24px;padding:24px;transition:.35s;box-shadow:0 10px 40px rgba(0,0,0,.4);margin-bottom:16px}
.pair-card.signal-buy{border-color:#22c55e55}
.pair-card.signal-sell{border-color:#ef444455}
.jackpot-card{border-color:var(--jackpot)!important;box-shadow:0 0 20px #ff6b3518}
.jackpot-banner{background:var(--jackpot-dim);border:1px solid var(--jackpot);border-radius:8px;padding:8px 12px;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.jb-text{font-size:12px;color:var(--jackpot);font-weight:600;font-family:var(--font-head)}
.pair-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
.pair-name{font-family:var(--font-head);font-size:18px;font-weight:700}
.pair-price{font-size:12px;color:var(--muted);margin-top:2px}
.signal-badge{font-size:12px;font-weight:600;padding:4px 13px;border-radius:20px;font-family:var(--font-head)}
.sig-buy{background:var(--green-dim);color:var(--green);border:1px solid #22c55e44}
.sig-sell{background:var(--red-dim);color:var(--red);border:1px solid #ef444444}
.sig-wait{background:var(--bg3);color:var(--muted);border:1px solid var(--border2)}
.sig-jp{background:var(--jackpot-dim);color:var(--jackpot);border:1px solid var(--jackpot);animation:jpulse 1.2s infinite}
@keyframes jpulse{0%,100%{box-shadow:0 0 0 0 #ff6b3540}50%{box-shadow:0 0 0 5px #ff6b3500}}
.card-ist{background:var(--bg3);border-radius:6px;padding:6px 10px;margin-bottom:9px;font-size:11px;display:flex;align-items:center;gap:7px}
.indicators{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:9px}
.ind-row{background:var(--bg3);border-radius:6px;padding:7px 9px}
.ind-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.ind-val{font-size:12px;font-weight:500}
.ind-sig{font-size:10px;margin-top:2px}
.score-section{margin-bottom:9px}
.score-label{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:4px}
.score-track{height:5px;background:var(--bg3);border-radius:3px}
.score-fill{height:5px;border-radius:3px;transition:width .8s ease}
.pair-footer{display:flex;gap:5px;flex-wrap:wrap}
.foot-tag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
/* Signal panel */
.signal-panel{background:var(--bg2);border:2px solid var(--gold);border-radius:14px;margin-bottom:16px;overflow:hidden}
.signal-panel-hdr{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:linear-gradient(135deg,#fbbf2408,transparent)}
.signal-panel-title{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px}
.signal-panel-body{padding:16px 17px}
/* AI History */
.hist-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.hist-hdr{padding:11px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hist-title{font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--purple)}
.aistats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:13px 17px;border-bottom:1px solid var(--border)}
.aistat{text-align:center}
.aistat-val{font-size:18px;font-weight:700;font-family:var(--font-head)}
.aistat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.hist-tbl-hdr{display:grid;grid-template-columns:28px 90px 70px 90px 70px 70px 80px;gap:6px;padding:7px 17px;font-size:10px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.hist-row{display:grid;grid-template-columns:28px 90px 70px 90px 70px 70px 80px;gap:6px;align-items:center;padding:8px 17px;border-bottom:1px solid var(--border);font-size:12px}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:var(--bg3)}
.res-win{color:var(--green);font-weight:600}
.res-loss{color:var(--red);font-weight:600}
.res-pending{color:var(--amber)}
/* IST Windows */
.ist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ist-win{border-radius:8px;padding:11px 13px;border:1px solid}
.ist-prime{background:#22c55e0d;border-color:#22c55e33}
.ist-good{background:#3b82f60d;border-color:#3b82f633}
.ist-caution{background:#f59e0b0d;border-color:#f59e0b33}
.ist-avoid{background:#ef44440d;border-color:#ef444433}
.ist-time{font-size:13px;font-weight:600;font-family:var(--font-head);margin-bottom:3px}
.ist-lbl{font-size:11px;font-weight:600;margin-bottom:3px}
.ist-reason{font-size:10px;color:var(--muted);line-height:1.5}
/* Ranked */
.ranked-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.ranked-hdr{padding:11px 17px;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.ranked-row{display:grid;grid-template-columns:32px 130px 1fr 66px 76px 80px;gap:7px;align-items:center;padding:8px 17px;border-bottom:1px solid var(--border);font-size:12px;transition:background .15s}
.ranked-row:last-child{border-bottom:none}
.ranked-row:hover{background:var(--bg3)}
.ranked-row.now-row{background:#22c55e08}
.rank-n{color:var(--muted);text-align:center;font-size:11px}
.rank-n.top3{color:var(--gold);font-weight:600}
.bar-wrap{height:4px;background:var(--bg3);border-radius:2px}
.bar-fill{height:4px;border-radius:2px}
.r-grade{font-size:11px;padding:2px 7px;border-radius:10px;text-align:center}
.g-J{background:var(--jackpot-dim);color:var(--jackpot)}
.g-A{background:#22c55e18;color:var(--green)}
.g-B{background:#3b82f618;color:var(--blue)}
.g-C{background:#f59e0b18;color:var(--amber)}
.g-D{background:#ef444418;color:var(--red)}
.g-F{background:var(--bg3);color:var(--muted)}
/* News */
.news-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.news-hdr{padding:11px 17px;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.news-row{display:flex;gap:11px;align-items:flex-start;padding:8px 17px;border-bottom:1px solid var(--border);font-size:12px}
.news-row:last-child{border-bottom:none}
.news-time{min-width:52px;color:var(--text);font-weight:500}
.nimp{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap}
.imp-H{background:#ef444418;color:var(--red);border:1px solid #ef444430}
.imp-M{background:#f59e0b18;color:var(--amber);border:1px solid #f59e0b30}
.imp-L{background:#3b82f618;color:var(--blue);border:1px solid #3b82f630}
.nsoon{font-size:10px;padding:2px 7px;border-radius:10px;background:#ef444418;color:var(--red);margin-left:auto}
/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 16px;font-size:12px;color:var(--text);z-index:9999;max-width:300px;animation:slidein .3s ease;display:none}
.toast.show{display:block}
@keyframes slidein{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.t-ok{border-color:var(--green)}
.toast.t-err{border-color:var(--red)}
.toast.t-jp{border-color:var(--jackpot);background:#1a1008}
/* Auth / role */
.user-badge{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px}
.user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#d97706);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;font-family:var(--font-head);flex-shrink:0}
.logout-btn{background:var(--bg2);border:1px solid rgba(239,68,68,.3);color:#ef4444;font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .2s}
.logout-btn:hover{background:#ef444415;border-color:#ef4444}
.readonly-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;background:#3b82f618;border:1px solid #3b82f630;color:var(--blue);border-radius:20px;padding:3px 9px;margin-left:8px;vertical-align:middle}
.locked-overlay{display:none;position:absolute;inset:0;z-index:10;background:rgba(10,12,15,.55);border-radius:10px;align-items:center;justify-content:center;flex-direction:column;gap:8px;font-size:13px;color:var(--muted);text-align:center;padding:20px}
.locked-overlay.show{display:flex}
/* Dhitta branding */
.dhitta-logo-wrap{display:flex;align-items:center;gap:12px}
.dhitta-name{font-family:'Syne',sans-serif;font-size:42px;font-weight:700;letter-spacing:.04em;background:linear-gradient(135deg,#f6d365 0%,#fbbf24 40%,#d97706 70%,#fbbf24 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dhitta-tagline{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#a07a20;margin-top:1px;font-family:'DM Mono',monospace}
/* Confidence threshold indicator */
.conf-90-notice{font-size:11px;padding:8px 12px;border-radius:6px;background:#fbbf2410;border:1px solid #fbbf2430;color:var(--gold);margin-bottom:14px}
/* Settings */
.settings-locked-msg{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:var(--muted);display:none;align-items:center;gap:10px}
.settings-locked-msg.show{display:flex}
/* Learning breakdown */
.learn-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-top:14px;overflow:hidden}
.learn-hdr{padding:12px 16px;background:linear-gradient(135deg,#a78bfa12,transparent);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.learn-title{font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--purple);display:flex;align-items:center;gap:8px}
.learn-body{padding:16px;display:none}
.learn-body.open{display:block}
.ind-explain{margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--border2)}
.ind-explain.bullish{border-left-color:var(--green)}
.ind-explain.bearish{border-left-color:var(--red)}
.ind-explain.neutral{border-left-color:var(--muted)}
.ind-exp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.ind-exp-name{font-size:12px;font-weight:600;font-family:var(--font-head)}
.ind-exp-val{font-size:13px;font-weight:700;font-family:var(--font-head)}
.ind-exp-meaning{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:5px}
.ind-exp-action{font-size:11px;padding:3px 10px;border-radius:10px;display:inline-block;margin-top:2px}
@media(max-width:700px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .ist-grid{grid-template-columns:1fr}
  .aistats-grid{grid-template-columns:repeat(3,1fr)}
  .hist-tbl-hdr,.hist-row{grid-template-columns:28px 80px 60px 80px 60px 60px}
  .hist-row span:last-child{display:none}
  .hist-tbl-hdr span:last-child{display:none}
  .indicators{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="shell">

<!-- ═══════════════ HEADER ═══════════════ -->
<header>
  <div class="dhitta-logo-wrap">
    <svg width="56" height="56" viewBox="0 0 62 62" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f6d365"/><stop offset="40%" stop-color="#fbbf24"/>
          <stop offset="70%" stop-color="#b45309"/><stop offset="100%" stop-color="#fbbf24"/>
        </linearGradient>
        <linearGradient id="goldG2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fde68a"/><stop offset="50%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#92400e"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <path d="M10 8 L10 54 L28 54 C42 54 52 44 52 31 C52 18 42 8 28 8 Z M18 16 L27 16 C36 16 43 23 43 31 C43 39 36 46 27 46 L18 46 Z" fill="url(#goldG)" filter="url(#glow)"/>
      <rect x="22" y="26" width="3" height="12" rx="0.5" fill="url(#goldG2)" opacity="0.95"/>
      <rect x="23" y="24" width="1" height="3" rx="0.5" fill="#fde68a"/>
      <rect x="27" y="21" width="3" height="15" rx="0.5" fill="url(#goldG2)" opacity="0.95"/>
      <rect x="28" y="19" width="1" height="3" rx="0.5" fill="#fde68a"/>
      <rect x="32" y="23" width="3" height="13" rx="0.5" fill="url(#goldG2)" opacity="0.95"/>
      <rect x="33" y="21" width="1" height="3" rx="0.5" fill="#fde68a"/>
      <path d="M14 50 Q31 58 50 42" stroke="url(#goldG)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <polygon points="50,42 44,40 47,46" fill="url(#goldG)"/>
    </svg>
    <div>
      <div class="dhitta-name">Dhitta</div>
      <div class="dhitta-tagline">Trading Signals &nbsp;—&nbsp; India 🇮🇳</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">EUR/USD · GBP/USD · XAU/USD · USD/JPY · 5-min · Real data</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span><span class="live-dot"></span> Live</span>
    <span class="clock" id="clock">--:--:-- IST</span>
    <button class="btn primary" onclick="runAll()">⟳ Refresh All</button>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name" style="color:var(--text);font-weight:500">Loading...</span>
      </div>
      <form method="POST" action="/logout" style="margin:0">
        <button type="submit" class="logout-btn">→ Logout</button>
      </form>
    </div>
  </div>
</header>

<!-- ═══════════════ TABS ═══════════════ -->
<div class="tabs">
  <div class="tab active" data-tab="signals" onclick="switchTab('signals')">📊 Signals</div>
  <div class="tab" data-tab="windows" onclick="switchTab('windows')">🕐 IST Windows</div>
  <div class="tab" data-tab="history" onclick="switchTab('history')">📋 Signal History</div>
  <div class="tab" data-tab="ranked" onclick="switchTab('ranked')">🏆 Ranked</div>
  <div class="tab" data-tab="news" onclick="switchTab('news')">📰 News</div>
  <div class="tab" data-tab="admin" id="admin-tab-btn" onclick="switchTab('admin')" style="display:none">🛠️ Admin</div>
</div>

<!-- ═══════════════ SIGNALS TAB ═══════════════ -->
<div id="tab-signals" class="tab-panel active">

  <!-- Settings -->
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden">
    <div style="padding:11px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleSettings()">
      <span style="font-size:13px;font-weight:600;font-family:var(--font-head);display:flex;align-items:center;gap:8px">
        ⚙️ Settings
        <span id="settings-status" style="font-size:11px;font-weight:400;color:var(--muted)">— click to configure</span>
        <span id="role-badge" style="display:none" class="readonly-badge">👁 View only</span>
      </span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn primary" onclick="event.stopPropagation();runAll()" style="font-size:12px">⟳ Analyze All</button>
        <span id="settings-arrow" style="color:var(--muted);font-size:12px">▼</span>
      </div>
    </div>
    <div style="position:relative">
      <div id="settings-locked-msg" class="settings-locked-msg">
        <span style="font-size:20px">🔒</span>
        <div><div style="font-weight:600;color:var(--text);margin-bottom:2px">Read-only access</div>
        <div>A
