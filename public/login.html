<!DOCTYPE html>
<html lang="en" style="overflow:hidden;height:100%;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhitta Trading Signals — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090c;--bg2:#0e1015;--bg3:#151820;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#e8eaf0;--muted:#5a6275;
  --gold:#fbbf24;--gold2:#f59e0b;--gold3:#92400e;--gold-pale:#fde68a;
  --green:#22c55e;--red:#ef4444;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);font-family:var(--mono);
  min-height:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;position:relative;
  /* overflow REMOVED — was clipping position:fixed candles on mobile/Chromium */
}
/* clip backgrounds but NOT fixed candles */
.bg-clip-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.bg-earth{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url('earth-bg.jpg');background-size:cover;background-position:center top;
  opacity:0.10;filter:grayscale(90%) brightness(.5) contrast(1.1);}
.bg-vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  /* FIXED: reduced opacity so candles are not smothered */
  background:radial-gradient(ellipse 80% 80% at 50% 0%,rgba(7,9,12,0) 0%,rgba(7,9,12,0.60) 100%),
    linear-gradient(180deg,rgba(7,9,12,0.30) 0%,rgba(7,9,12,0.55) 55%,rgba(7,9,12,0.75) 100%);}
.bg-stars{position:fixed;inset:0;z-index:2;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 5% 10%,rgba(255,255,255,.50),transparent),
    radial-gradient(1px 1px at 15% 38%,rgba(255,255,255,.28),transparent),
    radial-gradient(1px 1px at 28% 7%,rgba(255,255,255,.42),transparent),
    radial-gradient(1px 1px at 43% 60%,rgba(255,255,255,.26),transparent),
    radial-gradient(1px 1px at 60% 20%,rgba(255,255,255,.38),transparent),
    radial-gradient(1px 1px at 72% 45%,rgba(255,255,255,.30),transparent),
    radial-gradient(1px 1px at 85% 12%,rgba(255,255,255,.44),transparent),
    radial-gradient(1px 1px at 91% 68%,rgba(255,255,255,.20),transparent),
    radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,.34),transparent),
    radial-gradient(1px 1px at 38% 88%,rgba(255,255,255,.24),transparent),
    radial-gradient(1px 1px at 67% 85%,rgba(255,255,255,.28),transparent),
    radial-gradient(1px 1px at 22% 52%,rgba(255,255,255,.18),transparent),
    radial-gradient(1px 1px at 53% 28%,rgba(255,255,255,.24),transparent),
    radial-gradient(1px 1px at 82% 90%,rgba(255,255,255,.30),transparent),
    radial-gradient(1.5px 1.5px at 48% 4%,rgba(251,191,36,.20),transparent),
    radial-gradient(1.5px 1.5px at 75% 35%,rgba(251,191,36,.14),transparent);
  background-repeat:no-repeat;background-size:100% 100%;}
.bg-grid{position:fixed;inset:0;z-index:3;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);
  background-size:56px 56px;}
.bg-ambient{position:fixed;top:-200px;left:50%;transform:translateX(-50%);
  width:720px;height:720px;z-index:4;pointer-events:none;
  background:radial-gradient(circle,rgba(251,191,36,0.09) 0%,rgba(251,191,36,0.028) 40%,transparent 70%);
  filter:blur(65px);animation:ambientPulse 9s ease-in-out infinite;}
@keyframes ambientPulse{
  0%,100%{opacity:.75;transform:translateX(-50%) scale(1)}
  50%{opacity:1;transform:translateX(-50%) scale(1.07)}}
.bg-chart{position:fixed;bottom:0;left:0;right:0;z-index:5;pointer-events:none;}
.candle-stage{position:fixed;inset:0;z-index:6;pointer-events:none;overflow:hidden;}

/* TICKER */
.ticker-wrap{position:fixed;bottom:0;left:0;right:0;z-index:20;height:34px;
  background:linear-gradient(90deg,rgba(7,9,12,0.94),rgba(14,16,21,0.97),rgba(7,9,12,0.94));
  border-top:1px solid rgba(251,191,36,0.09);overflow:hidden;display:flex;align-items:center;}
.ticker-label{flex-shrink:0;padding:0 14px;font-size:9px;letter-spacing:.20em;text-transform:uppercase;
  color:var(--gold);font-weight:600;border-right:1px solid rgba(251,191,36,0.14);
  height:100%;display:flex;align-items:center;background:rgba(251,191,36,0.04);}
.ticker-track{flex:1;overflow:hidden;position:relative;}
.ticker-inner{display:flex;animation:tickerScroll 40s linear infinite;white-space:nowrap;will-change:transform;}
.ticker-inner:hover{animation-play-state:paused;}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 22px;
  font-size:11px;font-family:var(--mono);border-right:1px solid rgba(255,255,255,.04);height:34px;}
.ticker-sym{color:rgba(255,255,255,.7);font-weight:500;letter-spacing:.03em;}
.ticker-price{color:var(--muted);font-size:10px;}
.ticker-up{color:#34d399;font-size:10px;}
.ticker-dn{color:#f87171;font-size:10px;}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* WRAP */
.login-wrap{width:100%;max-width:460px;position:relative;z-index:10;
  animation:wrapFloat 7s ease-in-out infinite;}
@keyframes wrapFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}

/* HERO */
.hero{text-align:center;margin-bottom:22px;position:relative;padding-top:4px;}
.hero-glow{position:absolute;top:-140px;left:50%;transform:translateX(-50%);
  width:520px;height:520px;z-index:-1;pointer-events:none;
  background:radial-gradient(circle,rgba(251,191,36,0.17) 0%,rgba(251,191,36,0.05) 44%,transparent 70%);
  filter:blur(52px);animation:ambientPulse 9s ease-in-out infinite;}
.logo-svg-wrap{display:flex;justify-content:center;margin-bottom:12px;
  filter:drop-shadow(0 0 16px rgba(251,191,36,.42)) drop-shadow(0 0 38px rgba(251,191,36,.18));
  animation:logoGlow 9s ease-in-out infinite;}
@keyframes logoGlow{
  0%,100%{filter:drop-shadow(0 0 16px rgba(251,191,36,.42)) drop-shadow(0 0 38px rgba(251,191,36,.18))}
  50%{filter:drop-shadow(0 0 24px rgba(251,191,36,.58)) drop-shadow(0 0 54px rgba(251,191,36,.26))}}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--green);
  background:#22c55e0e;border:1px solid #22c55e26;border-radius:20px;padding:3px 10px;margin-bottom:10px;letter-spacing:.04em;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.18}}
.hero-title-wrap{position:relative;display:inline-block;}
.hero-title{font-family:var(--font);font-size:60px;font-weight:700;letter-spacing:.16em;
  background:linear-gradient(150deg,#fde68a 0%,#fbbf24 32%,#f59e0b 55%,#d97706 72%,#fbbf24 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin:4px 0 12px;}
.hero-title-wrap::after{content:'DHITTA';position:absolute;inset:0;
  font-family:var(--font);font-size:60px;font-weight:700;letter-spacing:.16em;line-height:1;
  color:var(--gold);filter:blur(24px);opacity:0.20;pointer-events:none;z-index:-1;}
.hero-tagline{font-size:11.5px;letter-spacing:.30em;text-transform:uppercase;
  color:var(--gold);font-family:var(--mono);font-weight:500;margin-bottom:7px;opacity:.82;}
.hero-sub{font-size:13px;color:var(--muted);letter-spacing:.03em;}

/* STATUS BAR */
.status-bar{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
  font-size:10px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;
  margin:20px 0 22px;padding:10px 18px;border:1px solid rgba(255,255,255,.046);
  border-radius:30px;background:rgba(255,255,255,.016);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite;flex-shrink:0;}
.status-sep{color:rgba(255,255,255,.09);}
.status-active{color:var(--green);font-weight:600;}
.status-bar strong{color:rgba(255,255,255,.62);font-weight:600;}

/* CARD */
.login-card{
  background:linear-gradient(148deg,rgba(22,24,33,0.74) 0%,rgba(10,12,18,0.87) 100%);
  backdrop-filter:blur(40px) saturate(165%);-webkit-backdrop-filter:blur(40px) saturate(165%);
  border:1px solid rgba(251,191,36,0.11);border-radius:24px;
  padding:40px 38px 36px;
  box-shadow:0 2px 0 0 rgba(251,191,36,0.16) inset,
    0 44px 110px rgba(0,0,0,0.72),
    0 0 0 1px rgba(255,255,255,0.022) inset,
    0 0 90px rgba(251,191,36,0.045);
  position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(251,191,36,.50),rgba(251,191,36,.80),rgba(251,191,36,.50),transparent);}
.login-card::after{content:'';position:absolute;inset:0;border-radius:24px;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(251,191,36,0.062),transparent 60%);pointer-events:none;}
.card-title{font-family:var(--font);font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:.01em;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:26px;letter-spacing:.02em;}

/* FORM */
.field{margin-bottom:18px;}
.field label{display:block;font-size:10.5px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;}
.field input{width:100%;background:rgba(9,11,17,0.72);border:1px solid rgba(255,255,255,0.085);
  color:var(--text);font-family:var(--mono);font-size:14px;padding:13px 15px;
  border-radius:10px;outline:none;transition:border-color .22s,box-shadow .22s,background .22s;letter-spacing:.02em;}
.field input:focus{border-color:rgba(251,191,36,0.42);background:rgba(13,15,22,0.82);
  box-shadow:0 0 0 3px rgba(251,191,36,0.075),0 0 22px rgba(251,191,36,0.055);}
.field input::placeholder{color:#252b38;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:46px;}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:4px;
  transition:color .18s;line-height:1;}
.pw-toggle:hover{color:var(--gold);}

/* BUTTON */
.login-btn{width:100%;
  background:linear-gradient(135deg,#f59e0b 0%,#fbbf24 50%,#f59e0b 100%);
  background-size:200% 100%;color:#000;
  font-family:var(--font);font-size:14px;font-weight:700;
  padding:14px;border:none;border-radius:10px;cursor:pointer;
  transition:all .25s;letter-spacing:.06em;margin-top:8px;
  position:relative;overflow:hidden;text-transform:uppercase;}
.login-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.20),transparent);transition:left .5s;}
.login-btn:hover::before{left:100%;}
.login-btn:hover{transform:translateY(-1.5px);
  box-shadow:0 10px 32px rgba(251,191,36,0.40),0 4px 14px rgba(251,191,36,0.22);}
.login-btn:active{transform:translateY(0);box-shadow:none;}

/* ERROR */
.error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.26);
  border-radius:9px;padding:10px 14px;font-size:12px;color:#fca5a5;
  margin-bottom:18px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(8px);}

/* DIVIDER */
.divider{border:none;border-top:1px solid rgba(255,255,255,.045);margin:22px 0;}
.card-footer-info{font-size:11px;color:var(--muted);text-align:center;line-height:1.9;}
.card-footer-info strong{color:rgba(255,255,255,.42);}

/* LOADER */
.login-btn.loading{pointer-events:none;opacity:.75;}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,0.25);
  border-top-color:#000;border-radius:50%;animation:spin .65s linear infinite;
  vertical-align:middle;margin-right:7px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE FOOTER */
.login-footer{text-align:center;margin-top:22px;margin-bottom:46px;
  font-size:10.5px;color:rgba(255,255,255,.14);line-height:1.7;letter-spacing:.04em;}
.login-footer strong{color:rgba(255,255,255,.26);}

/* CANDLESTICKS */
.candle{position:absolute;pointer-events:none;will-change:transform,opacity;
  opacity:0;animation-fill-mode:forwards;animation-timing-function:ease-out;}
.candle .candle-wick{position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:1.5px;background:currentColor;opacity:.42;}
.candle .candle-body{position:absolute;left:0;width:100%;border-radius:2px;background:currentColor;}
.candle.green{color:var(--green);}
.candle.red{color:var(--red);}
.candle.depth-back{filter:blur(2px);}
.candle.depth-back .candle-body{box-shadow:0 0 4px currentColor;opacity:.68;}
.candle.depth-mid .candle-body{box-shadow:0 0 10px currentColor,0 0 24px currentColor,0 0 40px currentColor;} /* FIXED: boosted glow */
.candle.depth-front .candle-body{box-shadow:0 0 14px currentColor,0 0 36px currentColor,0 0 70px currentColor,0 0 100px currentColor;} /* FIXED: max glow */
.candle.green.depth-front .candle-body{box-shadow:0 0 14px #22c55e,0 0 36px rgba(34,197,94,.70),0 0 70px rgba(34,197,94,.38),0 0 100px rgba(34,197,94,.18);}
.candle.red.depth-front .candle-body{box-shadow:0 0 14px #ef4444,0 0 36px rgba(239,68,68,.70),0 0 70px rgba(239,68,68,.38),0 0 100px rgba(239,68,68,.18);}
@keyframes candleRise{
  0%{transform:translateY(0) scale(.88);opacity:0;}
  10%{opacity:var(--peak-opacity,.9);}
  88%{opacity:calc(var(--peak-opacity,.9)*.72);}
  100%{transform:translateY(-118vh) scale(1.02);opacity:0;}}
@keyframes candleFall{
  0%{transform:translateY(0) scale(.88);opacity:0;}
  10%{opacity:var(--peak-opacity,.9);}
  88%{opacity:calc(var(--peak-opacity,.9)*.72);}
  100%{transform:translateY(118vh) scale(1.02);opacity:0;}}
@keyframes candleReverseUp{
  0%{transform:translateY(0) scale(.65);opacity:0;}
  22%{opacity:var(--peak-opacity,.8);}
  100%{transform:translateY(-38vh) scale(.45);opacity:0;}}
@keyframes candleReverseDown{
  0%{transform:translateY(0) scale(.65);opacity:0;}
  22%{opacity:var(--peak-opacity,.8);}
  100%{transform:translateY(38vh) scale(.45);opacity:0;}}
.candle.rise{bottom:-90px;animation-name:candleRise;}
.candle.fall{top:-90px;animation-name:candleFall;}
.candle.reverse-up{bottom:-70px;animation-name:candleReverseUp;}
.candle.reverse-down{top:-70px;animation-name:candleReverseDown;}

@media(max-width:480px){
  .login-card{padding:28px 22px 26px;}
  .hero-title{font-size:44px;letter-spacing:.12em;}
  .hero-title-wrap::after{font-size:44px;letter-spacing:.12em;}
  .hero-tagline{font-size:9.5px;letter-spacing:.22em;}
  .status-bar{font-size:9px;gap:6px;padding:8px 12px;}
  .ticker-wrap{display:none;}
}
</style>
</head>
<body>

<div class="bg-earth"    aria-hidden="true"></div>
<div class="bg-vignette" aria-hidden="true"></div>
<div class="bg-stars"    aria-hidden="true"></div>
<div class="bg-grid"     aria-hidden="true"></div>
<div class="bg-ambient"  aria-hidden="true"></div>

<!-- Faint background line chart -->
<svg class="bg-chart" aria-hidden="true" viewBox="0 0 1440 230" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chartFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(251,191,36,0.16)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </linearGradient>
  </defs>
  <path d="M0 190 L70 174 L140 181 L220 158 L300 166 L380 138 L460 152 L540 124 L620 135 L700 105 L780 118 L860 92 L940 104 L1020 76 L1100 90 L1180 64 L1260 78 L1340 52 L1400 64 L1440 44 L1440 230 L0 230 Z"
        fill="url(#chartFade)" opacity="0.28"/>
  <path d="M0 190 L70 174 L140 181 L220 158 L300 166 L380 138 L460 152 L540 124 L620 135 L700 105 L780 118 L860 92 L940 104 L1020 76 L1100 90 L1180 64 L1260 78 L1340 52 L1400 64 L1440 44"
        fill="none" stroke="rgba(251,191,36,0.20)" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>

<div class="candle-stage" id="candleStage" aria-hidden="true"></div>

<!-- Live ticker -->
<div class="ticker-wrap" aria-hidden="true">
  <div class="ticker-label">LIVE</div>
  <div class="ticker-track">
    <div class="ticker-inner" id="tickerInner"></div>
  </div>
</div>

<div class="login-wrap">

  <div class="hero">
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="logo-svg-wrap">
      <svg width="80" height="80" viewBox="0 0 62 62" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#f6d365"/>
            <stop offset="40%"  stop-color="#fbbf24"/>
            <stop offset="70%"  stop-color="#b45309"/>
            <stop offset="100%" stop-color="#fbbf24"/>
          </linearGradient>
          <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#fde68a"/>
            <stop offset="50%"  stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#92400e"/>
          </linearGradient>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="1.8" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d="M10 8 L10 54 L28 54 C42 54 52 44 52 31 C52 18 42 8 28 8 Z M18 16 L27 16 C36 16 43 23 43 31 C43 39 36 46 27 46 L18 46 Z"
              fill="url(#gA)" filter="url(#glow2)"/>
        <rect x="22" y="26" width="3" height="12" rx="0.5" fill="url(#gB)" opacity="0.95"/>
        <rect x="23" y="24" width="1" height="3"  rx="0.5" fill="#fde68a"/>
        <rect x="23" y="38" width="1" height="3"  rx="0.5" fill="#fde68a"/>
        <rect x="27" y="21" width="3" height="15" rx="0.5" fill="url(#gB)" opacity="0.95"/>
        <rect x="28" y="19" width="1" height="3"  rx="0.5" fill="#fde68a"/>
        <rect x="28" y="36" width="1" height="3"  rx="0.5" fill="#fde68a"/>
        <rect x="32" y="23" width="3" height="13" rx="0.5" fill="url(#gB)" opacity="0.95"/>
        <rect x="33" y="21" width="1" height="3"  rx="0.5" fill="#fde68a"/>
        <rect x="33" y="36" width="1" height="3"  rx="0.5" fill="#fde68a"/>
        <path d="M14 50 Q31 58 50 42" stroke="url(#gA)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <polygon points="50,42 44,40 47,46" fill="url(#gA)"/>
      </svg>
    </div>
    <div class="live-badge"><span class="live-dot"></span>&nbsp;Live Signals</div>
    <div class="hero-title-wrap">
      <h1 class="hero-title">DHITTA</h1>
    </div>
    <div class="hero-tagline">AI&#x2011;Powered Market Intelligence</div>
    <div class="hero-sub">Detect opportunities before the crowd.</div>
  </div>

  <div class="status-bar">
    <span class="status-dot"></span>
    <span>Live Market Intelligence</span>
    <span class="status-sep">|</span>
    <span>Markets: <strong>24</strong></span>
    <span class="status-sep">|</span>
    <span>AI Accuracy: <strong>87%</strong></span>
    <span class="status-sep">|</span>
    <span>Status: <span class="status-active">Active</span></span>
  </div>

  <div class="login-card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your signal dashboard</div>

    <div id="err-box" class="error-box" style="display:none">
      <span>&#x26A0;</span>
      <span id="err-msg">Invalid username or password. Please try again.</span>
    </div>

    <form id="login-form" method="POST" action="/login" onsubmit="handleSubmit()">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
          placeholder="Enter your username"
          autocomplete="username" autocapitalize="none" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password"
            placeholder="Enter your password"
